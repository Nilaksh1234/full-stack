<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <style>

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #74ebd5, #ACB6E5);
        }

        
        form {
            background-color: white;
            padding: 40px;
            border-radius: 15px; /* Rounded corners */
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); /* Soft shadow */
            width: 350px;
            text-align: left; /* Aligns labels to the left */
        }

        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block; 
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        
        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%; /* Full width */
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box; 
            
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #74ebd5; /* Highlight color when typing */
            outline: none;
        }

        /* 5. GENDER RADIO BUTTONS */
        .gender-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .gender-option {
            display: flex;
            align-items: center;
            gap: 5px; /* Space between radio circle and text */
            font-weight: normal;
        }

        /* 6. SUBMIT BUTTON */
        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50; /* Green */
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #45a049; /* Darker green on hover */
        }
    </style>
</head>

<body>

    <form action="C:\Users\Nilaksh\Desktop\download\ecommerce-store-main\account.html" >
        
        <h1>Registration</h1>
        
        <div class="form-group">
            <label for="Name">Full Name</label>
            <input type="text" id="Name" placeholder="John Doe" required>
        </div>
        
        <div class="form-group">
            <label for="E-mail">E-mail Address</label>
            <input type="email" id="E-mail" placeholder="john@example.com" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="********" required>
        </div>
        
        <label>Gender</label>
        <div class="gender-group">
            <div class="gender-option">
                <input type="radio" id="male" name="gender" value="male">
                <label for="male" style="margin:0; font-weight:normal;">Male</label>
            </div>
            
            <div class="gender-option">
                <input type="radio" id="female" name="gender" value="female">
                <label for="female" style="margin:0; font-weight:normal;">Female</label>
            </div>
        </div>
        
        <button type="submit">Create Account</button>

    </form>
</body>

</html>
