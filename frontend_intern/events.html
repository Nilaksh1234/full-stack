<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JS Event Masterclass - Fixed</title>
    <style>
      :root {
        --primary: #6366f1;
        --bg: #f8fafc;
        --text: #1e293b;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        padding: 20px;
        display: grid;
        grid-template-columns: 1fr 350px; /* Wider log area */
        gap: 20px;
        /* Added min-height to allow testing the Scroll event */
        min-height: 150vh;
      }

      .container {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        position: sticky; /* Keeps the controls visible while scrolling */
        top: 20px;
        height: fit-content;
      }

      .box {
        width: 100%;
        height: 120px;
        background: var(--primary);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 20px 0;
        border-radius: 8px;
        cursor: pointer;
        user-select: none;
        transition: all 0.2s ease;
        font-weight: bold;
      }

      input,
      select {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 2px solid #e2e8f0;
        border-radius: 6px;
        font-size: 1rem;
        outline: none;
      }

      input:focus {
        border-color: var(--primary);
      }

      /* Event Log Sidebar */
      #log-container {
        position: sticky;
        top: 20px;
        height: 90vh;
        display: flex;
        flex-direction: column;
      }

      #event-log {
        background: #1e293b;
        color: #38bdf8;
        padding: 15px;
        border-radius: 8px;
        overflow-y: auto;
        font-family: "Courier New", monospace;
        font-size: 0.85rem;
        flex-grow: 1;
      }

      .log-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .clear-btn {
        background: #f43f5e;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.7rem;
      }

      .log-entry {
        border-bottom: 1px solid #334155;
        padding: 8px 0;
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateX(10px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      @media (max-width: 768px) {
        body {
          grid-template-columns: 1fr;
        }
        #log-container {
          position: relative;
          height: 300px;
        }
      }
    </style>
  </head>
  <body onload="logEvent('Window: Load Successful')">
    <div class="container">
      <h1>Event Interaction Hub</h1>
      <p>Try Mouse, Keyboard, and Scroll actions!</p>

      <div id="mouseBox" class="box">Interact with this Box</div>

      <input
        type="text"
        id="keyInput"
        placeholder="Type here for Keyboard events..."
      />

      <form id="sampleForm">
        <select id="mySelect">
          <option value="">Choose an option (Change Event)</option>
          <option value="A">Option A</option>
          <option value="B">Option B</option>
        </select>
        <button
          type="submit"
          style="
            width: 100%;
            background: #22c55e;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
          "
        >
          SUBMIT FORM
        </button>
      </form>

      <p style="margin-top: 20px; font-size: 0.8rem; color: #64748b">
        ↓ Scroll down to trigger Window Scroll events ↓
      </p>
    </div>

    <div id="log-container">
      <div class="log-header">
        <strong style="color: #1e293b">LIVE EVENT LOG</strong>
        <button class="clear-btn" onclick="clearLog()">Clear</button>
      </div>
      <div id="event-log"></div>
    </div>

    <script>
      const logArea = document.getElementById("event-log");
      const mouseBox = document.getElementById("mouseBox");
      const keyInput = document.getElementById("keyInput");
      const sampleForm = document.getElementById("sampleForm");
      const mySelect = document.getElementById("mySelect");

      function logEvent(msg) {
        const entry = document.createElement("div");
        entry.className = "log-entry";
        const time = new Date().toLocaleTimeString([], {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });
        entry.innerHTML = `<span style="color: #94a3b8">${time}</span> > ${msg}`;
        logArea.prepend(entry);
      }

      function clearLog() {
        logArea.innerHTML = "";
        logEvent("Log Cleared");
      }

      mouseBox.addEventListener("click", () => logEvent("Mouse: Single Click"));
      mouseBox.addEventListener("dblclick", () =>
        logEvent("Mouse: DOUBLE Click"),
      );
      mouseBox.addEventListener("mouseenter", () => {
        logEvent("Mouse: Hover In");
        mouseBox.style.transform = "scale(1.02)";
        mouseBox.style.background = "#4338ca";
      });
      mouseBox.addEventListener("mouseleave", () => {
        logEvent("Mouse: Hover Out");
        mouseBox.style.transform = "scale(1)";
        mouseBox.style.background = "#6366f1";
      });
      mouseBox.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        logEvent("Mouse: Right Click (Menu Blocked)");
      });

      keyInput.addEventListener("keydown", (e) =>
        logEvent(`Key: Down [${e.key}]`),
      );
      keyInput.addEventListener("keyup", (e) => logEvent(`Key: Up [${e.key}]`));

      keyInput.addEventListener("focus", () => logEvent("Input: Focused"));
      keyInput.addEventListener("blur", () =>
        logEvent("Input: Blurred (Lost Focus)"),
      );

      mySelect.addEventListener("change", (e) => {
        if (e.target.value) logEvent(`Select: Changed to ${e.target.value}`);
      });

      sampleForm.addEventListener("submit", (e) => {
        e.preventDefault();
        logEvent("Form: Submit Handled");
        alert("Form submitted! Check the log.");
      });

      window.addEventListener("resize", () => logEvent("Window: Resized"));
      window.addEventListener("scroll", () => {
        logEvent("Window: Scrolling...");
      });
    </script>
  </body>
</html>
