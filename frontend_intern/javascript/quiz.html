<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Flash Quiz</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        justify-content: center;
        padding-top: 50px;
        background: #12125d;
        color: #333;
      }
      #quiz-container {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        width: 400px;
        text-align: center;
      }
      .hidden {
        display: none;
      }
      #options-container {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 20px 0;
      }
      button {
        padding: 12px;
        cursor: pointer;
        border: 1px solid #ddd;
        border-radius: 4px;
        background-color: #f8f9fa;
        font-size: 1rem;
        transition: 0.2s;
      }
      button:hover:not(:disabled) {
        background: #e0e0e0;
      }
      button:disabled {
        cursor: default;
      }
      .correct {
        background-color: #d4edda !important;
        color: #155724;
        border-color: #c3e6cb;
        font-weight: bold;
      }
      .wrong {
        background-color: #f8d7da !important;
        color: #721c24;
        border-color: #f5c6cb;
      }
      #feedback-text {
        height: 20px;
        font-weight: bold;
        margin-top: 10px;
      }
      #timer {
        font-weight: bold;
        color: #d9534f;
      }
      #status-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        font-size: 0.9rem;
      }
    </style>
  </head>

  <body>
    <div id="quiz-container">
      <h1>Flash Quiz</h1>
      
      <div id="start-screen">
        <p>Test your knowledge!</p>
        <button id="start-btn">Start Quiz</button>
      </div>

      <div id="game-screen" class="hidden">
        <div id="status-bar">
          <span id="progress"></span>
          <span id="timer">Time: 10s</span>
        </div>
        <h2 id="question-text"></h2>
        <div id="options-container"></div>
        <p id="feedback-text"></p>
      </div>

      <div id="result-screen" class="hidden">
        <h2>Quiz Results</h2>
        <p id="score-summary"></p>
        <button id="restart-btn">Try Again</button>
      </div>
    </div>

    <script>
      const questionsData = [
        { q: "What is 2 + 2?", a: ["4", "22", "5", "3"], correct: "4" },
        { q: "Capital of France?", a: ["Paris", "London", "Berlin", "Rome"], correct: "Paris" },
        { q: "Which is a JS framework?", a: ["React", "Django", "Laravel", "Flask"], correct: "React" },
        { q: "HTML stands for?", a: ["HyperText Markup Language", "HighText Machine Language", "HyperTool Multi Language", "None"], correct: "HyperText Markup Language" },
        { q: "Which symbol is for IDs in CSS?", a: ["#", ".", "@", "&"], correct: "#" }
      ];

      let currentQuestions = [];
      let currentIndex = 0;
      let score = { correct: 0, wrong: 0, unanswered: 0 };
      let timer;
      let timeLeft = 10;

      const startBtn = document.getElementById('start-btn');
      const restartBtn = document.getElementById('restart-btn');
      const gameScreen = document.getElementById('game-screen');
      const resultScreen = document.getElementById('result-screen');
      const startScreen = document.getElementById('start-screen');

      function startQuiz() {
        score = { correct: 0, wrong: 0, unanswered: 0 };
        currentIndex = 0;
        currentQuestions = [...questionsData].sort(() => Math.random() - 0.5);

        startScreen.classList.add('hidden');
        resultScreen.classList.add('hidden');
        gameScreen.classList.remove('hidden');
        showQuestion();
      }

      function showQuestion() {
        if (currentIndex >= currentQuestions.length) {
          return showResults();
        }

        const data = currentQuestions[currentIndex];
        document.getElementById('progress').innerText = `Question ${currentIndex + 1} of ${currentQuestions.length}`;
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('feedback-text').innerText = "";

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = "";

       
        [...data.a].sort(() => Math.random() - 0.5).forEach(opt => {
          const btn = document.createElement('button');
          btn.innerText = opt;
          btn.onclick = () => checkAnswer(opt);
          optionsContainer.appendChild(btn);
        });

        startTimer();
      }

      function startTimer() {
        clearInterval(timer);
        timeLeft = 10;
        document.getElementById('timer').innerText = `Time: ${timeLeft}s`;

        timer = setInterval(() => {
          timeLeft--;
          document.getElementById('timer').innerText = `Time: ${timeLeft}s`;
          if (timeLeft <= 0) {
            clearInterval(timer);
            checkAnswer(null); 
          }
        }, 1000);
      }

      function checkAnswer(selected) {
        clearInterval(timer);
        const correct = currentQuestions[currentIndex].correct;
        const feedback = document.getElementById('feedback-text');
        
       
        const btns = document.querySelectorAll('#options-container button');
        btns.forEach(b => b.disabled = true);

        if (selected === null) {
          score.unanswered++;
          feedback.innerText = "Time's Up!";
          feedback.style.color = "orange";
        } else if (selected === correct) {
          score.correct++;
          feedback.innerText = "Correct! ✨";
          feedback.style.color = "green";
        } else {
          score.wrong++;
          feedback.innerText = "Wrong! ❌";
          feedback.style.color = "red";
        }

       
        btns.forEach(btn => {
          if (btn.innerText === correct) btn.classList.add('correct');
          if (btn.innerText === selected && selected !== correct) btn.classList.add('wrong');
        });

       
        setTimeout(() => {
          currentIndex++;
          showQuestion();
        }, 1500);
      }

      function showResults() {
        gameScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');
        document.getElementById('score-summary').innerHTML = `
          <div style="text-align: left; display: inline-block;">
            <strong>Correct:</strong> ${score.correct} <br>
            <strong>Wrong:</strong> ${score.wrong} <br>
            <strong>Unanswered:</strong> ${score.unanswered}
          </div>
        `;
      }

      startBtn.onclick = startQuiz;
      restartBtn.onclick = startQuiz;
    </script>
  </body>
</html>
